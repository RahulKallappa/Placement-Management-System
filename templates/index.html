{% extends 'base.html' %}

{% block content %}
<div class="row align-items-center mt-5">
    <div class="col-md-6 text-center text-md-start">
        <h1 class="display-4 fw-bold text-primary">Welcome to Placement Management System</h1>
        <p class="lead mt-3 text-muted">A streamlined platform to connect talented students with top companies. Manage applications, track statuses, and achieve your career goals.</p>
        <div class="mt-4">
            <a href="{{ url_for('register') }}" class="btn btn-primary btn-lg px-4 me-2">Get Started</a>
            <a href="{{ url_for('login') }}" class="btn btn-outline-secondary btn-lg px-4">Login</a>
        </div>
    </div>
    <div class="col-md-6 mt-5 mt-md-0 text-center">
        <img src="https://images.unsplash.com/photo-1521737711867-e3b97375f902?auto=format&fit=crop&w=600&q=80" alt="Placement Students" class="img-fluid rounded shadow-lg" style="max-height: 400px; object-fit: cover;">
    </div>
</div>
{% endblock %}
