{% extends 'base.html' %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2>Admin Dashboard</h2>
        <p class="text-muted">Overview of Placement System Data</p>
    </div>
</div>

<div class="row mb-4">
    <div class="col-md-3 mb-3">
        <div class="card bg-primary text-white h-100 shadow">
            <div class="card-body text-center">
                <i class="fas fa-users fa-3x mb-2 opacity-50"></i>
                <h3 class="card-title">{{ students_count }}</h3>
                <p class="card-text">Total Students</p>
            </div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card bg-success text-white h-100 shadow">
            <div class="card-body text-center">
                <i class="fas fa-building fa-3x mb-2 opacity-50"></i>
                <h3 class="card-title">{{ companies_count }}</h3>
                <p class="card-text">Companies Registered</p>
            </div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card bg-info text-white h-100 shadow">
            <div class="card-body text-center">
                <i class="fas fa-file-alt fa-3x mb-2 opacity-50"></i>
                <h3 class="card-title">{{ applications_count }}</h3>
                <p class="card-text">Total Applications</p>
            </div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card bg-warning text-dark h-100 shadow">
            <div class="card-body text-center">
                <i class="fas fa-trophy fa-3x mb-2 opacity-50"></i>
                <h3 class="card-title">{{ placed_count }}</h3>
                <p class="card-text">Students Placed</p>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">Students by Branch</h5>
            </div>
            <div class="card-body">
                <canvas id="branchChart" width="400" height="200"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const ctx = document.getElementById('branchChart').getContext('2d');
        const branchData = {{ branch_stats | tojson | safe }};
        
        const labels = branchData.map(item => item.branch);
        const data = branchData.map(item => item.count);
        
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Number of Students',
                    data: data,
                    backgroundColor: 'rgba(54, 162, 235, 0.6)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { stepSize: 1 }
                    }
                }
            }
        });
    });
</script>
{% endblock %}
